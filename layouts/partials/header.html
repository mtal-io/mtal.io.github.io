<header class="nav" id="nav">
  <div class="nav__inner">

    <a href="{{ "/" | relURL }}" class="nav__logo" aria-label="{{ .Site.Title }} Home">
      <span class="nav__logo-mark">⬡</span>
      <span class="nav__logo-text">{{ .Site.Title }}</span>
    </a>

    <nav class="nav__links" aria-label="Primary navigation">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}">{{ .Name }}</a>
      {{ end }}
    </nav>

    <div class="nav__actions">
        <!--
      <button class="theme-toggle" id="themeToggle" aria-label="Switch colour theme" title="Switch colour theme">
        <span class="theme-toggle__label theme-toggle__label--1">Deep Seam</span>
        <span class="theme-toggle__track">
          <span class="theme-toggle__thumb"></span>
        </span>
        <span class="theme-toggle__label theme-toggle__label--2">Minetech</span>
      </button>
        -->

      {{ range .Site.Menus.actions }}
        {{ if .HasChildren }}
          <div class="dropdown">
            <button class="dropbtn">{{ .Name }}</button>
            <div class="dropdown-content">
              {{ range .Children }}
                <a href="{{ .URL }}">{{ .Name }}</a>
              {{ end }}
            </div>
          </div>
        {{ else }}
          <a href="{{ .URL }}" class="nav__secondary-link">{{ .Name }}</a>
        {{ end }}
      {{ end }}

      <a href="/join/" class="btn btn--nav">Join Community →</a>
    </div>

    <button class="nav__burger" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

  </div>
</header>
