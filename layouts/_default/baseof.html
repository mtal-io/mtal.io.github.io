<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{ .Site.Params.description | default "AI-powered mineral discovery and blockchain-funded mining projects" }}" />
  <title>{{ if .IsHome }}{{ .Site.Title }} — AI Mining Intelligence{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <!-- Outfit as body fallback (Google Fonts) while Museo Sans files are sourced -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}" />
  <link rel="stylesheet" href="{{ "css/option1.css" | relURL }}" id="themeStylesheet" />
  <link rel="stylesheet" href="{{ "css/option2.css" | relURL }}" />
</head>
<body>
  {{ block "main" . }}{{ end }}
  <script src="{{ "js/main.js" | relURL }}"></script>
</body>
</html>
