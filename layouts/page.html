{{ define "main" }}
{{ partial "header.html" . }}

<main class="page-main">
  <div class="page-inner">
    <div class="page-header">
      {{ with .Params.section_label }}<div class="section-label">{{ . }}</div>{{ end }}
      <h1 class="page-headline">{{ .Title }}</h1>
      {{ with .Description }}<p class="page-description">{{ . }}</p>{{ end }}
    </div>
    <div class="page-content">
      {{ .Content }}
    </div>
  </div>
</main>

{{ partial "footer.html" . }}
{{ end }}
